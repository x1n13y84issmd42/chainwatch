<html>
<head>
	<style>
		html {
			background-color: #333;
		}
		canvas {
			border: 1px red solid;
		}
	</style>
</head>
<body>
	<canvas id="canvas" width="10" height="10"></canvas>
	<script>
		const ctx = window.canvas.getContext("2d");
		ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
		// Draw the filled rectangle
		ctx.fillRect(8, 0, 2, 2);
	</script>
</body>
</html>
