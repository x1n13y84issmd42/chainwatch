<component:tx_list>
	<div class="'tx_list small_list'">
		<for of="this.txs" onclick="this.onclick" d="this.d">
			<p class="`type_${item[this.d].type}`" onclick="this.onclick(item[this.d].a)">
				<span class="'name ' + (item[this.d].name ? 'full' : 'addr')">item[this.d].name||item[this.d].as</span>
				<span class="'w'">item.amount</span>
			</p>
		</for>
	</div>
</component:tx_list>
