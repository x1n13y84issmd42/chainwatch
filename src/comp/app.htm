<component:app>
	<if
		cond="this.account"
		web3="this.web3"
		unauthorize="this.unauthorize"
	>
		<explorer web3="this.web3" unauthorize="this.unauthorize"></explorer>
	</if>
	<if cond="!this.account" authorize="this.authorize">
		<alert type="`info`" title="'Not connected'" authorize="this.authorize">
			<p>'Please connect you wallet to begin.'</p>
			<btn onclick="this.authorize" value="'CONNECT'" />
		</alert>
	</if>
</component:app>
