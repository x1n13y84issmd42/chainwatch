<component:explorer>
	<div class="'explorer'" >
		<!-- <sidebar
			unauthorize="this.unauthorize"
			addnode="this.addnode"
			onaddrsubmit="this.onaddrsubmit"
			monitor="this.monitor"
		>
			<side_btn_input value="'ADD ADDR'" onsubmit="this.onaddrsubmit"></side_btn_input>
			<side_btn value="'MONITOR'" onclick="this.monitor"></side_btn>
		</sidebar> -->
		<sidebar_wide
			unauthorize="this.unauthorize"
			addnode="this.addnode"
			onaddrsubmit="this.onaddrsubmit"
			monitor_start="this.monitor_start"
			monitor_pause="this.monitor_pause"
			top_addresses="this.top_addresses"
			explore_address="this.explore_address"
			monitor="this.monitor"
			stats="this.stats"
		>
			<button_bar
				monitor="this.monitor"
				monitor_start="this.monitor_start"
				monitor_pause="this.monitor_pause"
			>
				<if cond="this.monitor" monitor_pause="this.monitor_pause">
					<btn value="'▍▍'" onclick="this.monitor_pause" class="'pause'"></btn>
				</if>
				<if cond="!this.monitor" monitor_start="this.monitor_start">
					<btn value="'▶'" onclick="this.monitor_start" class="'play'"></btn>
				</if>
			</button_bar>

			<div class="'stats'">
				<p><span class="'n'">'Block:'</span><span class="'v'">this.stats.blockN</span></p>
				<p><span class="'n'">'Tx count:'</span><span class="'v'">this.stats.txCount</span></p>
				<!-- <p><span class="'n'">'Tx skipped:'</span><span class="'v'">this.stats.txSkippedCount</span></p> -->
				<p><span class="'n'">'Wallets:'</span><span class="'v'">this.stats.walletAddrs</span></p>
				<p><span class="'n'">'Contracts:'</span><span class="'v'">this.stats.contractAddrs</span></p>
			</div>

			<address_list addresses="this.top_addresses" addrclick="this.explore_address"></address_list>
		</sidebar_wide>


		<svg id="graph" width="600" height="600" ></svg>
	</div>
</component:explorer>
